name: PR Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Validate test env config
        run: |
          test -n "${{ vars.TEST_ENV_FILE }}" || (echo "TEST_ENV_FILE is not set" >&2 && exit 1)
          test -n "${CORS_ORIGINS}" || (echo "CORS_ORIGINS is not set" >&2 && exit 1)

      - name: Prepare test env file
        run: printf '%s' "${{ vars.TEST_ENV_FILE }}" > .env.test

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Build Image
        run: docker build -t hitsujii-sleep-school-backend:ci .
