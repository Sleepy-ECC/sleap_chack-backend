name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloud-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE }}
      SERVICE_ACCOUNT_EMAIL: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
      GCS_BUCKET: ${{ vars.GCS_BUCKET }}
      VOICEVOX_API_BASE_URL: ${{ vars.VOICEVOX_API_BASE_URL }}
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
      CLOUD_SQL_CONNECTION_NAME: ${{ vars.CLOUD_SQL_CONNECTION_NAME }}
      APP_NAME: ${{ vars.APP_NAME }}
      JWT_ISSUER: ${{ vars.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ vars.JWT_AUDIENCE }}
      MIN_INSTANCES: ${{ vars.MIN_INSTANCES }}
      MAX_INSTANCES: ${{ vars.MAX_INSTANCES }}
      ALLOW_UNAUTHENTICATED: ${{ vars.ALLOW_UNAUTHENTICATED }}
      DATABASE_SSL: ${{ vars.DATABASE_SSL }}
      DATABASE_URL_SECRET_NAME: ${{ vars.DATABASE_URL_SECRET_NAME }}
      JWT_SECRET_NAME: ${{ vars.JWT_SECRET_NAME }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required GitHub variables
        env:
          REQUIRED_GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REQUIRED_GCP_REGION: ${{ vars.GCP_REGION }}
          REQUIRED_ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
          REQUIRED_CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
          REQUIRED_GCP_SERVICE_ACCOUNT_EMAIL: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          REQUIRED_GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          REQUIRED_CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          REQUIRED_GCS_BUCKET: ${{ vars.GCS_BUCKET }}
          REQUIRED_VOICEVOX_API_BASE_URL: ${{ vars.VOICEVOX_API_BASE_URL }}
        run: |
          missing=0
          [ -n "${REQUIRED_GCP_PROJECT_ID}" ] || { echo "::error title=Missing GitHub Variable::GCP_PROJECT_ID is not set"; missing=1; }
          [ -n "${REQUIRED_GCP_REGION}" ] || { echo "::error title=Missing GitHub Variable::GCP_REGION is not set"; missing=1; }
          [ -n "${REQUIRED_ARTIFACT_REGISTRY_REPOSITORY}" ] || { echo "::error title=Missing GitHub Variable::ARTIFACT_REGISTRY_REPOSITORY is not set"; missing=1; }
          [ -n "${REQUIRED_CLOUD_RUN_SERVICE}" ] || { echo "::error title=Missing GitHub Variable::CLOUD_RUN_SERVICE is not set"; missing=1; }
          [ -n "${REQUIRED_GCP_SERVICE_ACCOUNT_EMAIL}" ] || { echo "::error title=Missing GitHub Variable::GCP_SERVICE_ACCOUNT_EMAIL is not set"; missing=1; }
          [ -n "${REQUIRED_GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || { echo "::error title=Missing GitHub Variable::GCP_WORKLOAD_IDENTITY_PROVIDER is not set"; missing=1; }
          [ -n "${REQUIRED_CORS_ORIGINS}" ] || { echo "::error title=Missing GitHub Variable::CORS_ORIGINS is not set"; missing=1; }
          [ -n "${REQUIRED_GCS_BUCKET}" ] || { echo "::error title=Missing GitHub Variable::GCS_BUCKET is not set"; missing=1; }
          [ -n "${REQUIRED_VOICEVOX_API_BASE_URL}" ] || { echo "::error title=Missing GitHub Variable::VOICEVOX_API_BASE_URL is not set"; missing=1; }

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 363.0.0"
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: bash scripts/deploy-cloud-run.sh
